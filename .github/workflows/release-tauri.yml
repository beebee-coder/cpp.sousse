
name: Release Tauri Application

on:
  push:
    branches:
      - main
    paths:
      - 'src-tauri/**'
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/release-tauri.yml'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # Pas de cache npm ici — package-lock.json doit être commité pour activer le cache
          # cache: 'npm'

      - name: Install Node dependencies
        run: npm install

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build Next.js Static Engine
        run: npm run build:tauri

      - name: Build Tauri Real Binary
        run: npm run desktop:build

      - name: Commit installer manifest
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/installers/installers.json
          git diff --cached --quiet || git commit -m "chore: update installer manifest [skip ci]"
          git pull --ff-only
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
